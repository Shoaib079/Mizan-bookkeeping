# Mizan frontend — Next.js 15 monorepo (Phase 12 Slice 12.1)
# Docs: DEPLOY.md

[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# ---------------------------------------------------------------------------
# Optional API proxy (same-origin /api/* → backend)
# Prefer NEXT_PUBLIC_API_URL pointing at the backend host directly.
# Uncomment after Render/Railway API is provisioned and set BACKEND_URL in Netlify.
# ---------------------------------------------------------------------------
# [[redirects]]
#   from = "/api/*"
#   to = ":BACKEND_URL/:splat"
#   status = 200
#   force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fresh-install-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Superuser for bootstrap (creates mizan role + mizan / mizan_test DBs).
          # Must match DATABASE_ADMIN_URL below — not the app DATABASE_URL user.
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mizan_dev
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      AUTH_ENFORCEMENT: "false"
      CLERK_TEST_MODE: "true"
      DATABASE_URL: postgresql+psycopg://mizan_app:mizan_dev@localhost:5432/mizan
      DATABASE_ADMIN_URL: postgresql+psycopg://postgres:mizan_dev@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client tools (backup restore tests)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dependency security scan (pip-audit)
        run: bash backend/scripts/security_dependency_scan.sh

      - name: Secrets audit (tracked source)
        run: bash backend/scripts/security_secrets_audit.sh

      - name: Production guard pytest
        env:
          AUTH_ENFORCEMENT: "true"
          CLERK_TEST_MODE: "false"
          CORS_ORIGINS: https://app.example.com
          CLERK_JWKS_URL: https://example.clerk.accounts.dev/.well-known/jwks.json
          CLERK_ISSUER: https://example.clerk.accounts.dev
          CLERK_AUDIENCE: pk_live_ci_placeholder
          CLERK_SECRET_KEY: sk_live_ci_placeholder
          CLERK_PUBLISHABLE_KEY: pk_live_ci_placeholder
        run: bash backend/scripts/security_production_pytest.sh

      - name: Fresh-install verify (clean venv, boot, full pytest)
        run: bash backend/scripts/verify_fresh_install.sh
